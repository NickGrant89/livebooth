# Production MediaMTX — copy to your VPS as mediamtx.yml
#
# BEFORE USE: replace LIVEBOOTH_APP_URL below with your hosted app, e.g.
#   https://livebooth.uk
# or https://your-project.vercel.app
#
# OBS:  rtmp://YOUR_VPS_OR_DOMAIN:1935/live   stream key = lb_… (from Go Live)
# HLS:  https://hls.yourdomain.com/live/lb_…/index.m3u8  (via Caddy — see Caddyfile.example)

logLevel: info
# Long sets — avoid dropping OBS on brief stalls (was 30s, caused ~30s recordings for some encoders)
readTimeout: 120s
writeTimeout: 120s

rtmp: yes
rtmpAddress: :1935

hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsAllowOrigins: ['*']

api: yes
apiAddress: :9997

authMethod: http
# On VPS with docker-compose.rtmp-solo.yml: MediaMTX → auth-proxy → Vercel (see deploy-rtmp-fix-to-droplet.sh)
# Direct Vercel (works if CA certs mounted in mediamtx container):
authHTTPAddress: http://auth-proxy:8091/auth
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof
  - action: read
  - action: playback

pathDefaults:
  record: yes
  # fmp4 on disk; remux watcher converts to browser-playable MP4 after stream ends
  recordFormat: fmp4
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordSegmentDuration: 4h
  recordDeleteAfter: 720h
  # Queue remux on host when publisher disconnects (processed by livebooth-remux.service)
  runOnUnPublish: sh -c 'echo "$MTX_PATH $(date +%s)" >> /recordings/.remux-queue'

paths:
  all_others:
    source: publisher
