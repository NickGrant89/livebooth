# Production RTMP on a VPS — run from rtmp-server/ on the server:
#   docker compose -f docker-compose.production.yml up -d
#
# Prereqs: mediamtx.production.yml edited (LIVEBOOTH_APP_URL), Caddy/nginx for HTTPS HLS

services:
  mediamtx:
    image: bluenviron/mediamtx:1
    container_name: livebooth-rtmp
    restart: unless-stopped
    volumes:
      - ./recordings:/recordings
      - ./mediamtx.production.yml:/mediamtx.yml:ro
      # MediaMTX image has no CA bundle — needed for HTTPS auth callback to Vercel
      - /etc/ssl/certs:/etc/ssl/certs:ro
    environment:
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    ports:
      - "1935:1935"              # RTMP ingest (public)
      - "127.0.0.1:8888:8888"    # HLS — localhost only; reverse-proxy via Caddy
      - "127.0.0.1:9997:9997"    # MediaMTX API — optional, keep private
    command: /mediamtx.yml

  compositor:
    build: ./compositor
    container_name: livebooth-compositor
    restart: unless-stopped
    environment:
      COMPOSITOR_SECRET: ${COMPOSITOR_SECRET:-}
      MEDIAMTX_RTMP_URL: rtmp://mediamtx:1935/live
      MEDIAMTX_API_URL: http://mediamtx:9997
      COMPOSITOR_PORT: 8090
    ports:
      - "127.0.0.1:8090:8090"    # Caddy → compositor.livebooth.uk for Vercel callbacks
    depends_on:
      - mediamtx
